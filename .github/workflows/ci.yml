name: Comprehensive CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  release:
    types: [published]

env:
  FORCE_COLOR: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install ruff
        run: python -m pip install "ruff>=0.15,<0.16"
      - name: Duplicate C++ check
        run: python3 scripts/check_duplicate_cpp.py
      - name: Ruff check
        run: ruff check .
      - name: Ruff format
        run: ruff format --check .

  test:
    name: Test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Vendor CFITSIO
        run: bash extern/vendor.sh --cfitsio-version extern/VERSIONS.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy astropy fitsio pytest nanobind scikit-build-core psutil pyarrow
      - name: Build and install
        run: pip install -e . --no-build-isolation
      - name: Pytest
        run: pytest tests/ -q

  bench-smoke:
    name: Benchmark smoke (py3.13)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Vendor CFITSIO
        run: bash extern/vendor.sh --cfitsio-version extern/VERSIONS.txt
      - name: Install
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy astropy fitsio pytest nanobind scikit-build-core psutil pyarrow
          pip install -e . --no-build-isolation
      - name: bench_cpp_backend
        run: python benchmarks/bench_cpp_backend.py

  docs-contract:
    name: Docs contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Vendor CFITSIO
        run: bash extern/vendor.sh --cfitsio-version extern/VERSIONS.txt
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy astropy fitsio pytest nanobind scikit-build-core psutil pyarrow
          pip install -e . --no-build-isolation
      - name: Docs integrity
        run: pytest tests/test_docs_integrity.py tests/test_package_isolation.py -q
