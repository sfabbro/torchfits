repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: check-duplicate-cpp
        name: Check for duplicate C++ file-scope functions
        entry: python3 scripts/check_duplicate_cpp.py
        language: system
        files: ^src/torchfits/cpp_src/.*\.cpp$
        pass_filenames: false
        always_run: false

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
