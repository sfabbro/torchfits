[workspace]
preview = ["pixi-build"]
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64"]

[package]
name = "torchfits"
version = "0.3.2"
description = "High-performance FITS I/O for PyTorch"
authors = ["Seb Fabbro <sebfabbro@gmail.com>"]

[package.build]
backend = { name = "pixi-build-cmake", version = "*"}

# Build dependencies - tools needed to build the package
# Note: cmake, ninja, and cxx-compiler are automatically provided by pixi-build-cmake
[package.build-dependencies]
nanobind = ">=2.10.2"
scikit-build-core = ">=0.11.6"
cmake = ">=3.21"
ninja = ">=1.10"
python = ">=3.10"
pytorch = ">=2.0,<2.11"
cfitsio = ">=4.6.3,<4.6.5"

# Host dependencies - libraries that will be linked into the package
[package.host-dependencies]
python = ">=3.10"
pytorch = ">=2.0,<2.11"
cfitsio = ">=4.6.3,<4.6.5"
nanobind = ">=2.10.2"

# Run dependencies - packages needed at runtime
[package.run-dependencies]
pytorch = ">=2.0,<2.11"

psutil = ">=5.0"  # For system resource monitoring
cfitsio = ">=4.6.3,<4.6.5"

# Workspace dependencies - development environment
[dependencies]
# torchfits = { path = "." }  # Don't add self-dependency - causes circular dependency
pytest = ">=8.0"
pytest-cov = ">=5.0"
ruff = ">=0.15.5,<0.16"
mypy = ">=1.9"
pip = ">=24.0"
astropy = ">=5.0"
fitsio = ">=1.2"
matplotlib = ">=3.8"
seaborn = ">=0.13"
pandas = ">=2.2"
psutil = ">=5.9"
scikit-build-core = ">=0.11.6"
cmake = ">=3.21"
ninja = ">=1.10"
nanobind = ">=2.10.2"
pytorch = ">=2.0,<2.11"
numpy = ">=1.20"
pre-commit = ">=3.5.0"

tabulate = ">=0.9.0"
twine = ">=5.0"

[tasks]
# Development tasks
dev = "pip install -e . --no-build-isolation"
build = "pixi build"
test = "KMP_DUPLICATE_LIB_OK=TRUE pytest tests/"
lint = "ruff check . && ruff format ."
verify = "python verify_setup.py"
setup-hooks = "pre-commit install"
pre-commit = "pre-commit run --all-files"
release-manual = "twine upload release_0.2.1/*"

# Core benchmarks (essential)
# After a fresh clone, run:  pixi run bench-install
# This builds the C++ extension once; benchmarks reuse it.
bench-install = "pip install -e . --no-build-isolation"
bench = "pixi run -e bench-all bench-install && pixi run -e bench-all python benchmarks/bench_all.py --profile user --scope all"
bench-fits = "pixi run -e bench-all bench-install && pixi run -e bench-all python benchmarks/bench_all.py --profile user --fits-only"
bench-fitstable = "pixi run -e bench-all bench-install && pixi run -e bench-all python benchmarks/bench_all.py --profile user --fitstable-only"
bench-fast = "pixi run -e bench python benchmarks/bench_fast.py --output benchmark_results/fast_results.csv"
bench-fast-stable = "pixi run -e bench python benchmarks/bench_fast.py --output benchmark_results/fast_results.csv --torch-threads 1 --compressed-repeats 3"
bench-core = "pixi run -e bench python benchmarks/bench_fast.py"
bench-table = "pixi run -e bench-all python benchmarks/bench_all.py --profile user --fitstable-only"
bench-table-arrow = "pixi run -e bench python benchmarks/bench_arrow_tables.py"
bench-table-arrow-diverse = "pixi run -e bench python benchmarks/bench_arrow_tables_diverse.py"

# Comprehensive benchmarks (renamed from exhaustive)
bench-all = "pixi run -e bench-all bench-install && pixi run -e bench-all python benchmarks/bench_all.py --profile user --scope all"
bench-all-keep = "pixi run -e bench-all bench-install && pixi run -e bench-all python benchmarks/bench_all.py --profile user --scope all --keep-temp"

# Comprehensive benchmark runner
bench-all-runner = "pixi run -e bench-all bench-install && pixi run -e bench-all python benchmarks/bench_all.py --profile user --scope all"
bench-all-force = "pixi run -e bench-all bench-install && pixi run -e bench-all python benchmarks/bench_all.py --profile lab --scope all"
bench-buffer = "pixi run -e bench python benchmarks/bench_buffer.py"
bench-cache = "pixi run -e bench python benchmarks/bench_cache.py"
bench-focused = "pixi run -e bench python benchmarks/bench_buffer.py && pixi run -e bench python benchmarks/bench_cache.py"

# Pytest-based benchmarking
bench-pytest = "pixi run -e bench pytest benchmarks/ --benchmark-only"

# Development tools
notebook = "pixi run -e default jupyter lab"

# Test phases for development workflow
test-phase1 = "pixi run -e default python -c 'import sys; sys.path.insert(0, \"src\"); import torchfits; print(\"Phase 1 COMPLETE: All core features implemented\")'"
test-buffer = "pixi run -e default pytest tests/test_buffer.py -v"

[feature.prod.dependencies]
python = "3.13.*"

# Test feature with comparison libraries
[feature.test.dependencies]
astropy = ">=5.0"
fitsio = ">=1.2"

# Benchmark feature with additional dependencies
[feature.bench.dependencies]
astropy = ">=5.0"
fitsio = ">=1.2"
matplotlib = ">=3.8"
seaborn = ">=0.13"
pandas = ">=2.2"
psutil = ">=5.9"
pytest-benchmark = ">=4.0"
# Build deps needed so pip install -e . can compile the C++ extension
cmake = ">=3.21"
ninja = ">=1.10"
nanobind = ">=2.10.2"
scikit-build-core = ">=0.11.6"
pip = ">=24.0"

[environments]
default = { features = ["prod"] }
test = { features = ["prod", "test"] }
bench = { features = ["prod", "bench"] }
bench-all = { features = ["prod", "bench"] }

[target.osx-arm64.dependencies]
cfitsio = ">=4.6.4,<4.6.5"

[target.linux-64.dependencies]
cfitsio = ">=4.6.3,<4.6.4"
